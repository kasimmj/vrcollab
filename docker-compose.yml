name: vrcollab

networks:
  vrnet:
    driver: bridge

volumes:
  postgres-data:
  minio-data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: vrcollab-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vrcollab
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vrcollab}
      POSTGRES_DB: vrcollab
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [vrnet]

  signaling:
    build: ./server
    container_name: vrcollab-signaling
    restart: unless-stopped
    depends_on: [postgres]
    ports:
      - "7880:7880"   # WebSocket signaling
      - "7881:7881"   # Admin dashboard
    environment:
      - DB_URL=postgres://vrcollab:${DB_PASSWORD:-vrcollab}@postgres:5432/vrcollab
      - JWT_SECRET=${JWT_SECRET:-change-me}
      - SFU_HOSTS=sfu-1:7882
    networks: [vrnet]

  sfu-1:
    build:
      context: ./server
      dockerfile: Dockerfile.sfu
    container_name: vrcollab-sfu-1
    restart: unless-stopped
    network_mode: host    # SFU needs host networking for UDP
    environment:
      - SFU_ID=sfu-1
      - RTP_PORT_RANGE=50000-50100
      - EXTERNAL_IP=${PUBLIC_IP:-127.0.0.1}
      - SIGNALING_URL=ws://localhost:7880

  minio:
    image: minio/minio:latest
    container_name: vrcollab-assets
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks: [vrnet]
